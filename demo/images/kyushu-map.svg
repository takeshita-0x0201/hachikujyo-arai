<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <style>
    .active { fill: #FFD700; stroke: #333; stroke-width: 1.5; }
    .inactive { fill: #E8E8E8; stroke: #999; stroke-width: 1; }
    .label { font-family: "Noto Sans JP", sans-serif; font-size: 13px; fill: #333; font-weight: 700; text-anchor: middle; }
    .label-small { font-family: "Noto Sans JP", sans-serif; font-size: 10px; fill: #666; text-anchor: middle; }
    .pin { fill: #CC3333; }
  </style>

  <!-- 福岡県 (active) -->
  <path class="active" d="M120,40 L200,30 L260,50 L280,80 L270,120 L250,140 L220,150 L180,160 L140,150 L100,130 L80,100 L90,60 Z"/>
  <text class="label" x="180" y="100">福岡県</text>

  <!-- 佐賀県 (active) -->
  <path class="active" d="M40,120 L100,130 L140,150 L130,190 L100,210 L60,200 L30,170 L25,140 Z"/>
  <text class="label" x="80" y="170">佐賀県</text>

  <!-- 長崎県 (inactive) -->
  <path class="inactive" d="M10,180 L30,170 L60,200 L50,240 L30,270 L10,280 L5,250 L15,220 Z"/>
  <text class="label-small" x="30" y="230">長崎県</text>

  <!-- 熊本県 (active) -->
  <path class="active" d="M60,200 L100,210 L130,190 L140,150 L180,160 L190,200 L180,250 L160,290 L130,310 L90,300 L60,280 L40,240 Z"/>
  <text class="label" x="120" y="250">熊本県</text>

  <!-- 大分県 (inactive) -->
  <path class="inactive" d="M220,150 L250,140 L270,120 L310,130 L330,160 L320,200 L290,220 L250,210 L220,200 L190,200 L180,160 Z"/>
  <text class="label-small" x="260" y="175">大分県</text>

  <!-- 宮崎県 (inactive) -->
  <path class="inactive" d="M190,200 L220,200 L250,210 L290,220 L310,260 L300,310 L270,350 L230,360 L200,340 L170,310 L160,290 L180,250 Z"/>
  <text class="label-small" x="240" y="290">宮崎県</text>

  <!-- 鹿児島県 (inactive) -->
  <path class="inactive" d="M90,300 L130,310 L170,310 L200,340 L230,360 L220,400 L190,430 L150,440 L110,420 L80,390 L60,350 L60,280 Z"/>
  <text class="label-small" x="145" y="380">鹿児島県</text>

  <!-- 拠点マーカー (久留米市) -->
  <circle class="pin" cx="160" cy="145" r="6"/>
  <text class="label-small" x="160" y="138" style="fill:#CC3333;font-weight:700;font-size:11px;">拠点</text>

  <!-- 凡例 -->
  <rect x="280" y="400" width="16" height="16" fill="#FFD700" stroke="#333" stroke-width="1"/>
  <text x="300" y="413" style="font-family:'Noto Sans JP',sans-serif;font-size:11px;fill:#333;">対応エリア</text>
  <rect x="280" y="422" width="16" height="16" fill="#E8E8E8" stroke="#999" stroke-width="1"/>
  <text x="300" y="435" style="font-family:'Noto Sans JP',sans-serif;font-size:11px;fill:#666;">対応外</text>
  <circle cx="288" cy="450" r="5" fill="#CC3333"/>
  <text x="300" y="453" style="font-family:'Noto Sans JP',sans-serif;font-size:11px;fill:#333;">拠点（久留米市）</text>
</svg>
